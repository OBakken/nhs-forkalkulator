",defaultOpen:!1,children:[i.jsx("p",{style:{marginBottom:8},children:"God fôring handler ikke bare om å «treffe på tall», men om å dekke hestens naturlige behov, helse og trivsel."}),i.jsx("p",{children:i.jsx("strong",{children:"Dekke hestens spiseinstinkt"})}),i.jsx("p",{children:"Hesten er en tilpasset grovfôreter og bruker i naturlige miljøer store deler av døgnet på å spise — ofte 12–18 timer. I stallmiljø kan den totale spisetiden bli betydelig kortere, i noen tilfeller bare noen få timer i døgnet, særlig dersom grovfôrmengden er knapp eller fôringen skjer i få, store måltider. For mange hester er det derfor gunstig å legge til rette for mer tyggetid og jevnere tilgang på grovfôr. Dersom hesten lett blir overvektig, kan et alternativ være å bruke grovfôr med lavere energikonsentrasjon (mer «magert» grovfôr) for å kunne øke mengden uten at energiinntaket blir for høyt. Halm kan i noen tilfeller brukes som tillegg for økt tyggetid, men bør innføres gradvis og brukes med fornuft (f.eks. ikke som eneste grovfôr)."}),i.jsx("p",{style:{marginTop:8},children:i.jsx("strong",{children:"Dekke hestens næringsbehov"})}),i.jsx("p",{children:"Hesten må få dekket behovet for energi (fra karbohydrater og fett), protein (til vedlikehold og muskulatur), samt mineraler og vitaminer (til skjelett, stoffskifte, immunforsvar og mange andre funksjoner). Grovfôr bør være grunnlaget i rasjonen, og kraftfôr/tilskudd brukes ved behov — typisk når grovfôret ikke dekker energi- eller næringsbehovet, eller når hesten har høyere krav (arbeid, vekst, drektighet/laktasjon)."}),i.jsx("p",{style:{marginTop:8},children:i.jsx("strong",{children:"Smakelighet"})}),i.jsx("p",{children:"Smakelighet påvirker både fôropptak og velferd. Hester kan ha tydelige preferanser, og dårlig smakelighet kan gi redusert appetitt og urolige fôringssituasjoner. Siden grovfôr utgjør størstedelen av rasjonen for de fleste hester, er det særlig viktig å finne et grovfôr hesten spiser godt. Mange hester foretrekker ensilasje som ikke er for tørr, men preferanser varierer — det beste er å observere hestens fôropptak og trivsel og velge det som fungerer i praksis."}),i.jsx("p",{style:{marginTop:8},children:i.jsx("strong",{children:"Hygienisk kvalitet"})}),i.jsx("p",{children:"God hygienisk kvalitet er avgjørende. Grovfôr skal være fritt for mugg og tydelig støv, og det skal lukte friskt. Dersom du finner tegn på mugg, varmgang eller uvanlig lukt, bør fôret ikke brukes. Finner du dødt dyr i rundballen, bør hele ballen kasseres, fordi dette gir høy risiko for botulisme (en alvorlig og potensielt dødelig forgiftning forårsaket av toksin fra Clostridium botulinum). Jordforurensning og råte er også uheldig og bør tas på alvor, selv om dødt dyr er den klassiske høyrisikosituasjonen. Husk at også kraftfôr kan bli dårlig (harskning, mugg, skadedyr), og at vannkvalitet betyr mye: hester drikker store mengder, og dårlig vann kan gi tydelige reaksjoner."}),i.jsx("p",{style:{marginTop:8},children:i.jsx("strong",{children:"Økonomi"})}),i.jsx("p",{children:"Unødvendige fôrtyper og «fancy» tilskuddsfôr med usikker effekt kan gjøre fôringa dyrere uten å gi reell gevinst. For mange hester er det mest å hente på å optimalisere grovfôret, siden det er den største delen av rasjonen. En grovfôranalyse (for eksempel via laboratorier som tilbyr fôranalyser) gir bedre grunnlag for å vite hva du faktisk kjøper og fôrer med."}),i.jsx("p",{style:{marginTop:8},children:i.jsx("strong",{children:"Praktisk gjennomførbarhet"})}),i.jsx("p",{children:"En god fôrplan må fungere i hverdagen. Mange ulike fôrslag, kompliserte rutiner og mye bløtlegging/veiing kan ta mye tid — særlig i større drift. Vurder derfor nytte opp mot arbeidsbelastning før du innfører rutiner som gjør fôringa unødvendig tung."}),i.jsx("p",{style:{marginTop:8},children:i.jsx("strong",{children:"Lett å fordøye og riktig til hest"})}),i.jsx("p",{children:"Det er forskjell på fôrtyper og hvor godt de passer hestens fordøyelse. Vær forsiktig med å bruke fôr som ikke er beregnet for hest, og gjør alle endringer gradvis (2–3 uker) for å gi tarmfloraen tid til å tilpasse seg."}),i.jsx("p",{style:{marginTop:8},children:i.jsx("strong",{children:"Doping og uønskede stoffer"})}),i.jsx("p",{children:"De fleste kommersielle hestefôr fra seriøse produsenter er laget med tanke på trygg bruk i hestesport, men det er likevel lurt å være varsom med «menneskemat», urter og uregistrerte tilskudd. Enkelte stoffer kan gi utslag på dopingprøver eller gi uønskede effekter, for eksempel produkter som inneholder koffein, eller fôr/tilskudd med uklart innhold. Dersom hesten konkurrerer, bør du alltid sjekke regelverk og anbefalinger for aktuelle produkter."})]}),i.jsxs($A,{title:"Magesår hos hest",icon:"🩺",children:[i.jsx("p",{children:i.jsx("strong",{children:"Hva er magesår?"})}),i.jsx("p",{children:"Magesår er sår eller etseskader i magesekkens slimhinne. Siden hesten produserer magesyre kontinuerlig (24 timer i døgnet), er den helt avhengig av nøytraliserende faktorer for å unngå skader."}),i.jsx("p",{style:{marginTop:4},children:"Den øvre delen av magesekken (den hvite, kjertelfrie slimhinnen) mangler naturlig beskyttelse. Her oppstår sår ofte ved «syreskvulp» under trening på tom mage. Den nedre delen (kjertelslimhinnen) produserer syre, men har en beskyttende barriere. Sår her skyldes ofte svikt i barrieren på grunn av stress eller medisiner."}),i.jsx("p",{style:{marginTop:8},children:i.jsx("strong",{children:"Forebygging gjennom fôring"})}),i.jsx("p",{children:"Fôring er ditt viktigste verktøy for å kontrollere syrenivået:"}),i.jsxs("p",{style:{marginTop:4},children:[i.jsx("strong",{children:"Grovfôr:"})," Tygging produserer spytt (bikarbonat), som er hestens naturlige syrenøytraliserende. Maks 4 timer uten fôr på dagtid."]}),i.jsxs("p",{children:[i.jsx("strong",{children:"Luserne:"})," Rik på kalsium og protein som fungerer som en «buffer» mot syre. En neve luserne før trening binder syren effektivt."]}),i.jsxs("p",{children:[i.jsx("strong",{children:"Begrens stivelse:"})," For mye korn øker syreproduksjonen. Bruk heller fiber- og fettrike alternativer."]}),i.jsxs("p",{children:[i.jsx("strong",{children:"Små måltider:"})," Fordel kraftfôret på mange små porsjoner (maks 0,3 kg per 100 kg kroppsvekt per måltid)."]}),i.jsx("p",{style:{marginTop:8},children:i.jsx("strong",{children:"Miljø og trening"})}),i.jsx("p",{children:"Stressmestring: Faste rutiner, mye utetid og forsiktig transport reduserer risikoen for stressrelaterte sår. Alltid fri tilgang til vann — dehydrering svekker blodsirkulasjonen i magen og gjør slimhinnen mer sårbar. Vær svært forsiktig med betennelsesdempende medisiner (NSAIDs), da disse kan skade mageslimhinnen ved feil bruk."}),i.jsx("p",{style:{marginTop:8},children:i.jsx("strong",{children:"Ved mistanke: Symptomer og tiltak"})}),i.jsx("p",{children:"Symptomene er ofte diffuse, men se etter: nedsatt prestasjon eller motvilje under ridning/stramming av gjord, dårlig matlyst (særlig på kraftfôr), matt pels eller vekttap, mild gjentakende kolikk. Kontakt veterinær for gastroskopi — dette er den eneste måten å stille en sikker diagnose."}),i.jsx("p",{style:{marginTop:8},children:i.jsx("strong",{children:"Behandling og beite"})}),i.jsx("p",{children:"Veterinæren kan forskrive syrehemmende medisin mens sårene gror. Hesten trenger ofte ro fra konkurransestress og en fôrplan med lav stivelse i tilhelingsperioden."}),i.jsx("p",{style:{marginTop:4},children:"Beite er «gull» for magen. Kontinuerlig gressinntak og naturlig bevegelse gir optimal syrebalanse og mentalt velvære."}),i.jsx("p",{style:{marginTop:4,fontWeight:700,fontSize:12.5},children:"Kort sagt: Magesår handler om totalbelastningen. En god fôrplan er fundamentet, men hesten må også trives mentalt for å holde seg frisk."})]}),i.jsxs($A,{title:"Fôring før og etter konkurranse",icon:"🏆",children:[i.jsx("p",{children:i.jsx("strong",{children:"Før start: Væske og blodsukker"})}),i.jsxs("p",{children:[i.jsx("strong",{children:"Vann før fôr:"})," Gi alltid vann før tørt fôr. En hydrert hest har bedre fordøyelse og lavere risiko for fôrstopp og kolikk."]}),i.jsxs("p",{style:{marginTop:4},children:[i.jsx("strong",{children:"Siste store fôring:"})," Bør kun være grovfôr, minst 6 timer før start. Unngå store mengder kraftfôr (stivelse) de siste 1–4 timene — dette hindrer at insulin stiger for mye, noe som ellers kan føre til et plutselig energifall midt under prestasjonen."]}),i.jsxs("p",{style:{marginTop:4},children:[i.jsx("strong",{children:"Magebeskyttelse:"})," Gi litt grovfôr eller en neve luserne 30–60 minutter før start. Det fungerer som en mekanisk sperre mot syreskvulp i magesekken. Dette er altså ikke en «fôring», men en liten magebeskyttelse — noe helt annet enn den store fôringen som bør skje minst 6 timer før."]}),i.jsx("p",{style:{marginTop:8},children:i.jsx("strong",{children:"Etter start: Restitusjon"})}),i.jsxs("p",{children:[i.jsx("strong",{children:"Fyll lagrene:"})," Musklene tømmes for glykogen under hardt arbeid. Det tar 24–48 timer å fylle dem helt opp igjen."]}),i.jsxs("p",{style:{marginTop:4},children:[i.jsx("strong",{children:"Raskt påfyll:"})," Gi stivelsesrikt kraftfôr når hesten har drukket og roet seg. Dette gir raskere restitusjon."]}),i.jsxs("p",{children:[i.jsx("strong",{children:"Elektrolytter:"})," Husk salt og vann først for å gjenopprette væskebalansen."]}),i.jsx("p",{style:{marginTop:6,fontWeight:700,fontSize:12.5},children:"Kort sagt: Vann og fiber før start for magen og hodet — kraftfôr etter start for musklene og restitusjon."})]}),i.jsxs($A,{title:"Beite",icon:"🌿",children:[i.jsx("p",{children:"Beite er den mest naturlige fôringssituasjonen for hester. Kontinuerlig gressinntak gir jevn syrenøytralisering i magesekken, naturlig bevegelse og mentalt velvære."}),i.jsxs("p",{style:{marginTop:6},children:[i.jsx("strong",{children:"Gradvis tilvenning:"})," Når hesten slippes på beite om våren, bør tilvenningen skje gradvis over 2–3 uker. Ferskt gras har høyt sukkerinnhold (spesielt om våren og ved nattefrost), og for rask overgang kan gi løs avføring, kolikk eller forfangenhet."]}),i.jsxs("p",{style:{marginTop:6},children:[i.jsx("strong",{children:"Energirikt:"})," Godt beite kan dekke energibehovet for hester i lett arbeid. Overvektige hester eller hester med metabolske problemer kan trenge begrenset beitetid eller tilgang til et mindre energirikt område."]}),i.jsxs("p",{style:{marginTop:6},children:[i.jsx("strong",{children:"Kombinasjon med annet fôr:"})," Hester som kun er på beite i deler av døgnet, bør fortsatt ha fri tilgang til grovfôr resten av tiden. Husk mineralstein — ferskt gras kan være fattig på natrium og selen."]})]}),i.jsxs($A,{title:"Energi (FEh) — hva er det?",icon:"⚡",children:[i.jsxs("p",{children:[i.jsx("strong",{children:"FEh"})," (Fôrenhet hest) er den nordiske enheten for energi i hestefôr. 1 FEh = 7,89 MJ netto energi."]}),i.jsx("p",{style:{marginTop:6},children:"Behovet beregnes ut fra hestens metabolske vekt (vekt opphøyd i 0,75), med justeringer for rase, kjønn, alder, treningsnivå og avlsstatus."})]}),i.jsxs($A,{title:"Protein — kvalitet teller mer enn mengde",icon:"💪",children:[i.jsxs("p",{children:["Appen regner med ",i.jsx("strong",{children:"fordøyelig råprotein (DCP)"})," — altså den delen hesten faktisk kan utnytte."]}),i.jsxs("p",{style:{marginTop:6},children:[i.jsx("strong",{children:"Lysin"})," er den første begrensende aminosyren, spesielt viktig for unghester. Grovfôr alene dekker sjelden lysinbehovet for hester i vekst."]}),i.jsx("p",{style:{marginTop:6},children:"Tegn på for lite protein: dårlig pelskvalitet, treg muskelbygning, nedsatt immunforsvar."}),i.jsx("p",{children:"Tegn på for mye: økt vannbehov, sterk ammoniakklukt i urin, økt svetting."}),i.jsx("p",{style:{marginTop:6},children:"Moderat overdosering er sjelden et problem, men dobbel til tredobbel dekning bør reduseres. Se om kraftfôr/tilskudd kan forenkles når grovfôret allerede dekker mye."})]}),i.jsxs($A,{t
